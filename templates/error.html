<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/style.css">
    <title>Error</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8fafc; color: #111827; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
        .card { background:white; padding:28px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.08); max-width:680px; }
        h1 { margin:0 0 12px 0; font-size:1.4rem; }
        p { margin:0 0 16px 0; color:#475569; }
        a.btn { display:inline-block; padding:10px 16px; background:#2563eb; color:white; border-radius:8px; text-decoration:none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Application Error</h1>
        <p>{{ message }}</p>
        <a class="btn" href="{{ url_for('index') }}">Back to Home</a>
    </div>
</body>
</html>
