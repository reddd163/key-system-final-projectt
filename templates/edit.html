<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Item</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        @media (max-width: 600px) {
            .panel { padding: 24px 18px; border-radius: 14px; }
            .title { font-size: 1.4rem; }
            .panel input, .panel select { padding: 14px 12px; }
            .panel button { padding: 14px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    {% if item %}
    <div class="page">
        <div class="panel">
            <p class="title">Edit Item</p>
            <form action="{{ url_for('edit', item_id=item.id) }}" method="POST">
                <input type="text" name="pname" placeholder="Enter item name" required value="{{ item.name }}" autocomplete="off">
                <input type="number" name="quantity" placeholder="Enter quantity" min="1" required value="{{ item.quantity }}" autocomplete="off">
                <button type="submit" class="submit-btn">Save Changes</button>
            </form>
            <p class="link"><a href="{{ url_for('dashboard') }}">Back to Dashboard</a></p>
        </div>
    </div>
    {% else %}
    <div class="page">
        <div class="panel">
            <p class="title">Item not found</p>
            <p class="link"><a href="{{ url_for('dashboard') }}">Back to Dashboard</a></p>
        </div>
    </div>
    {% endif %}
</body>
</html>
